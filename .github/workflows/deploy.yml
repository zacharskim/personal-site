name: Deploy to Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install Pillow "git+https://github.com/hbldh/hitherdither" bs4

      - name: Dither images
        run: |
          python3 utils/dither_images.py --directory content/

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build Hugo site
        run: hugo

      - name: Calculate page sizes
        run: |
          python3 utils/calculate_size.py --directory public/ --baseURL https://infinite-monkey.biz

      - name: Deploy to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: mattz
          key: ${{ secrets.PI_SSH_KEY }}
          source: "public/*"
          target: "/var/www/personal-site/"
          strip_components: 1
          overwrite: true
